<div class="wechat-connector-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>微信桥接设置</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="wechat-bridge_block flex-container">
                <label for="wechat_bridge_url">桥接服务器 WebSocket URL</label>
                <input type="text" id="wechat_bridge_url" class="text_pole" placeholder="ws://127.0.0.1:2334">
                <div id="wechat_connection_status" style="margin-top: 10px; font-weight: bold;">状态： 未连接</div>
            </div>
            <div class="wechat-bridge_block flex-container">
                <input id="wechat_connect_button" class="menu_button" type="button" value="连接" />
                <input id="wechat_disconnect_button" class="menu_button" type="button" value="断开" />
            </div>
            <div class="wechat-bridge_block flex-container">
                <label class="checkbox_label" for="wechat_auto_connect">
                    <input type="checkbox" id="wechat_auto_connect">
                    <span>页面加载时自动连接</span>
                </label>
            </div>
            <hr class="sysHR" />
        </div>
    </div>
</div>
